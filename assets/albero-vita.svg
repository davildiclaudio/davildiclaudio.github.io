<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" fill="none" stroke="currentColor" stroke-width="2.5">
  <!-- Tree of Life / Sephirot -->
  <!-- nodi: Keter top, Chokhmah & Binah, Da'at, Chesed & Gevurah, Tiferet, Netzach & Hod, Yesod, Malkuth bottom -->
  <g fill="#000">
    <!-- Kether -->
    <circle cx="200" cy="60" r="40"/>
    <!-- Chokhmah / Binah -->
    <circle cx="90" cy="180" r="40"/>
    <circle cx="310" cy="180" r="40"/>
    <!-- Daat -->
    <circle cx="200" cy="260" r="40"/>
    <!-- Chesed / Gevurah -->
    <circle cx="90" cy="360" r="40"/>
    <circle cx="310" cy="360" r="40"/>
    <!-- Tiferet -->
    <circle cx="200" cy="440" r="40"/>
    <!-- Netzach / Hod -->
    <circle cx="90" cy="540" r="40"/>
    <circle cx="310" cy="540" r="40"/>
    <!-- Yesod -->
    <circle cx="200" cy="640" r="40"/>
    <!-- Malkuth -->
    <circle cx="200" cy="750" r="40"/>
  </g>
  <!-- paths -->
  <path d="M200 100 L90 180 M200 100 L310 180 M90 180 L310 180
           M90 180 L200 260 M310 180 L200 260 M200 100 L200 260
           M200 260 L90 360 M200 260 L310 360 M90 360 L310 360
           M90 180 L90 360 M310 180 L310 360
           M90 360 L200 440 M310 360 L200 440 M200 260 L200 440
           M90 360 L310 540 M310 360 L90 540
           M200 440 L90 540 M200 440 L310 540 M90 540 L310 540
           M90 540 L200 640 M310 540 L200 640 M200 440 L200 640
           M90 540 L200 750 M310 540 L200 750 M200 640 L200 750"/>
</svg>
