<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900">
  <defs>
    <style>
      .c { mix-blend-mode: multiply; opacity: 0.85; }
      .lbl { font: 600 22px 'Space Grotesk',sans-serif; fill:#fff; text-anchor:middle; letter-spacing:2px; }
      .out { font: italic 18px 'Space Grotesk',sans-serif; fill:#cfd0d6; }
    </style>
  </defs>
  <g class="c">
    <circle cx="450" cy="300" r="230" fill="#58d8b1"/>
    <circle cx="620" cy="420" r="230" fill="#ea9ab8"/>
    <circle cx="450" cy="540" r="230" fill="#8a6ae0"/>
    <circle cx="280" cy="420" r="230" fill="#7ac8dc"/>
  </g>
  <text class="lbl" x="360" y="360">PASSIONE</text>
  <text class="lbl" x="540" y="360">MISSIONE</text>
  <text class="lbl" x="360" y="510">PROFESSIONE</text>
  <text class="lbl" x="540" y="510">VOCAZIONE</text>

  <g fill="#333" font-family="'Space Grotesk',sans-serif">
    <text x="450" y="60" text-anchor="middle" font-style="italic" font-size="24">Ciò che <tspan font-weight="700" font-style="normal">ami fare</tspan></text>
    <text x="860" y="430" text-anchor="end" font-style="italic" font-size="22">Qualcosa di cui</text>
    <text x="860" y="458" text-anchor="end" font-weight="700" font-size="22">il mondo ha bisogno</text>
    <text x="450" y="850" text-anchor="middle" font-style="italic" font-size="24">Qualcosa per cui <tspan font-weight="700" font-style="normal">essere pagato</tspan></text>
    <text x="40" y="430" font-style="italic" font-size="22">Ciò che sei</text>
    <text x="40" y="458" font-weight="700" font-size="22">bravo a fare</text>
  </g>
</svg>
